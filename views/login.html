<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toegang | Hartspraak</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #FAF8F5; --color-bg-alt: #F3EEE8; --color-text: #2D3436;
            --color-text-light: #636E72; --color-accent: #5D7A6C; --color-accent-dark: #4A6358;
            --color-border: #DDD5CA;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Source Sans 3', -apple-system, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, var(--color-bg) 0%, var(--color-bg-alt) 100%);
            color: var(--color-text); position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 20% 80%, rgba(93,122,108,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(201,166,107,0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        .login-container {
            position: relative; z-index: 1; background: white; border-radius: 12px;
            padding: 3rem; width: 100%; max-width: 420px; margin: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid var(--color-border);
        }
        .login-logo { text-align: center; margin-bottom: 2rem; }
        .login-logo h1 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 500; color: var(--color-accent-dark); }
        .login-logo p { font-size: 0.9rem; color: var(--color-text-light); margin-top: 0.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block; font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--color-text-light); margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%; padding: 0.9rem 1rem; border: 1px solid var(--color-border); border-radius: 6px;
            font-family: var(--font-body); font-size: 1rem; color: var(--color-text); background: var(--color-bg);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .form-group input:focus { outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(93,122,108,0.1); }
        .btn-login {
            width: 100%; padding: 1rem; background: var(--color-accent); color: white; border: none; border-radius: 6px;
            font-family: var(--font-body); font-size: 0.95rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; cursor: pointer; transition: background 0.3s ease, transform 0.2s ease;
        }
        .btn-login:hover { background: var(--color-accent-dark); transform: translateY(-1px); }
        .error-msg {
            background: #FDF5F3; border: 1px solid #E17055; color: #E17055;
            padding: 0.75rem 1rem; border-radius: 6px; font-size: 0.9rem; margin-bottom: 1.5rem; display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <h1>Substantie-ondersteunde Therapie</h1>
            <p>Hartspraak</p>
        </div>
        <div class="error-msg" id="errorMsg">Onjuiste toegangscode. Probeer het opnieuw.</div>
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="accessCode">Toegangscode</label>
                <input type="password" id="accessCode" name="accessCode" placeholder="Voer uw toegangscode in" required autofocus>
            </div>
            <button type="submit" class="btn-login">Toegang</button>
        </form>
    </div>
    <script>
        if (window.location.search.includes('error=1')) document.getElementById('errorMsg').style.display = 'block';
    </script>
</body>
</html>
